name: Test Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare local environment
        run: cp .env.example .env
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Set up CI environment file
        run: bash scripts/setup-ci-env.sh
      - name: Validate Compose config
        run: docker compose --env-file .env.ci -f compose.yml -f compose.override.yml config
      - run: docker compose --env-file .env.ci -f compose.yml -f compose.override.yml down -v --remove-orphans
      - run: docker compose --env-file .env.ci -f compose.yml -f compose.override.yml up -d db mailcatcher
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - run: docker compose --env-file .env.ci -f compose.yml -f compose.override.yml down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=70
        working-directory: backend
