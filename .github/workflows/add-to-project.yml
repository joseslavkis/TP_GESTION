name: Add to Project

on:
  pull_request:
  issues:
    types:
      - opened
      - reopened

env:
  HAS_PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN != '' }}

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - name: Skip when PROJECTS_TOKEN is not configured
        if: env.HAS_PROJECTS_TOKEN != 'true'
        run: echo "PROJECTS_TOKEN is not configured; skipping Add to project."
      - uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        if: env.HAS_PROJECTS_TOKEN == 'true'
        with:
          project-url: https://github.com/orgs/fastapi/projects/2
          github-token: ${{ secrets.PROJECTS_TOKEN }}
