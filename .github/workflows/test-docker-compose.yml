name: Test Docker Compose

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up CI environment file
        - name: Set up CI environment file
        run: |
          cat > .env.ci << 'EOF'
          SECRET_KEY=ci-test-secret-key-for-testing-only
          FRONTEND_HOST=http://localhost:5173
          DOMAIN=localhost
          PROJECT_NAME=TestApp
          POSTGRES_SERVER=localhost
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=app
          FIRST_SUPERUSER=test@example.com
          FIRST_SUPERUSER_PASSWORD=testpassword123
          ENVIRONMENT=local
          BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:8000"]
          STACK_NAME=test
          DOCKER_IMAGE_BACKEND=test
          DOCKER_IMAGE_FRONTEND=test
          EOF
      - run: docker compose --env-file .env.ci build
      - run: docker compose --env-file .env.ci down -v --remove-orphans
      - run: docker compose --env-file .env.ci up -d --wait backend frontend adminer
      - name: Test backend is up
        run: curl http://localhost:8000/api/v1/utils/health-check
      - name: Test frontend is up
        run: curl http://localhost:5173
      - run: docker compose --env-file .env.ci down -v --remove-orphans
